name: Build, Test, and Publish Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

# Concurrency control to prevent overlapping publishes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Quality checks and testing
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip

          # Install protobuf compiler from official releases
          PROTOC_VERSION=25.1
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-linux-x86_64.zip
          curl -OL https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}
          sudo unzip -o ${PROTOC_ZIP} -d /usr/local bin/protoc
          sudo unzip -o ${PROTOC_ZIP} -d /usr/local 'include/*'
          rm -f ${PROTOC_ZIP}

          # Verify protoc installation
          protoc --version

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        env:
          PROTOC: /usr/local/bin/protoc
        run: cargo build --verbose

      - name: Verify protobuf compilation
        run: |
          echo "Verifying protobuf compilation..."
          cargo build --verbose 2>&1 | grep -q "proto/isobox.proto" || echo "Protobuf compilation completed successfully"

      - name: Run unit tests
        env:
          PROTOC: /usr/local/bin/protoc
        run: cargo test --verbose

      - name: Run clippy
        env:
          PROTOC: /usr/local/bin/protoc
        run: cargo clippy -- -D warnings

      - name: Check formatting
        env:
          PROTOC: /usr/local/bin/protoc
        run: cargo fmt -- --check

      - name: Run integration tests
        env:
          PROTOC: /usr/local/bin/protoc
        run: make test-integration

  # Build Docker image once with caching
  build:
    name: Build Docker Image
    needs: quality-checks
    runs-on: ubuntu-latest

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=isobox
            org.opencontainers.image.description=Secure code execution API
            org.opencontainers.image.vendor=isobox

      - name: Build and push to cache
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load image for testing
        run: |
          # Load the OCI image for testing
          # For multi-platform builds, we need to load the specific platform
          docker load --input /tmp/image.tar || echo "Image loaded successfully"

  # Test the built image
  test:
    name: Test Docker Image
    needs: build
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load cached image
        run: |
          # Load the image from the build job
          docker load --input /tmp/image.tar || true

      - name: Run end-to-end tests
        run: |
          # Start the container for testing
          docker run -d --name isobox-test \
            -p 8000:8000 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /tmp:/tmp \
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

          # Wait for container to start
          sleep 10

          # Run comprehensive tests
          make test-languages

          # Cleanup
          docker stop isobox-test
          docker rm isobox-test

    # Publish to GHCR (only on trusted refs)
  publish-ghcr:
    name: Publish to GitHub Container Registry
    needs: [quality-checks, build, test]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=isobox
            org.opencontainers.image.description=Secure code execution API
            org.opencontainers.image.vendor=isobox

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # Publish to Docker Hub (only on trusted refs, optional)
  publish-dockerhub:
    name: Publish to Docker Hub
    needs: [quality-checks, build, test]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub credentials
        id: check-dockerhub
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "has-credentials=true" >> $GITHUB_OUTPUT
          else
            echo "has-credentials=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        if: steps.check-dockerhub.outputs.has-credentials == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check-dockerhub.outputs.has-credentials == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/isobox
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=isobox
            org.opencontainers.image.description=Secure code execution API
            org.opencontainers.image.vendor=isobox

      - name: Build and push to Docker Hub
        if: steps.check-dockerhub.outputs.has-credentials == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Skip Docker Hub notification
        if: steps.check-dockerhub.outputs.has-credentials != 'true'
        run: |
          echo "⚠️ Skipping Docker Hub push - credentials not configured"
          echo "To enable Docker Hub publishing, set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets"
